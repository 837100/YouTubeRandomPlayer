<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>랜덤 크리에이터 영상 재생기</title>
  <link rel="stylesheet" href="stylee.css" />
</head>

<body>
  <header class="topbar">
    <h1>랜덤 크리에이터 영상 재생기</h1>
    <div class="topbar__actions">
      <button type="button" id="autoPlayToggleBtn" class="autoPlayToggle" aria-pressed="false">
        <span class="autoPlayToggle__icon" aria-hidden="true">⏭</span>
        <span class="autoPlayToggle__label">자동 재생</span>
      </button>
      <button type="button" id="cinemaToggleBtn" class="cinemaToggle" aria-pressed="false">
        <span class="cinemaToggle__icon" aria-hidden="true">▶</span>
        <span class="cinemaToggle__label">영화관 모드</span>
      </button>
    </div>
  </header>

  <main class="container">
    <!-- <p class="desc">YouTube 채널 링크를 넣으면 해당 크리에이터의 영상 중 하나를 랜덤으로 재생합니다.</p> -->

    <div class="layout">
      <section class="card playerCard">
        <div id="status" class="status">대기 중...</div>
        <div class="playerWrap">
          <iframe id="player" width="100%" height="480" src="" title="YouTube player" frameborder="0"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen">
          </iframe>
        </div>
      </section>

      <aside class="sidePanel">
        <form id="creatorForm" class="card sideCard">


          <label>
            YouTube 채널 핸들 (@없이 입력)
            <div class="inputWrap">
              <input id="channelInput" type="text" placeholder="creatorname" required />
              <button type="button" id="clearChannelBtn" class="clearBtn" aria-label="입력 지우기" hidden>×</button>
            </div>
          </label>

          <div class="filterGroups">
            <fieldset class="filter-group filter-group--shorts is-disabled" id="exclude60sFilterGroup">
              <legend class="filter-group__legendRow">
                <label class="filter-group__switchLabel">
                  <input type="checkbox" id="exclude60sCheckbox" class="filter-group__switchInput" />
                  <span class="filter-group__switch" aria-hidden="true">
                    <span class="filter-group__switchThumb"></span>
                  </span>
                </label>
                <span class="filter-group__title">60초 이하 영상 제외</span>
                <span class="filter-hint">(≈Shorts)</span>
              </legend>
              <p class="filter-group__desc">Shorts와 같은 60초 이하 영상을 제외합니다.</p>
            </fieldset>

            <fieldset class="filter-group filter-group--live is-disabled" id="excludeLiveFilterGroup">
              <legend class="filter-group__legendRow">
                <label class="filter-group__switchLabel">
                  <input type="checkbox" id="excludeLiveCheckbox" class="filter-group__switchInput" />
                  <span class="filter-group__switch" aria-hidden="true">
                    <span class="filter-group__switchThumb"></span>
                  </span>
                </label>
                <span class="filter-group__title">Live 영상 제외</span>
              </legend>
              <p class="filter-group__desc">현재 방송 중이거나 예정된 Live 방송을 제외합니다.</p>
            </fieldset>

            <fieldset class="filter-group filter-group--viewCount is-disabled" id="viewCountFilterGroup">
              <legend class="filter-group__legendRow">
                <button type="button" id="viewCountToggleBtn" class="filter-group__switch"
                  role="switch" aria-checked="false" aria-controls="viewCountFilterBody">
                  <span class="filter-group__switchThumb" aria-hidden="true"></span>
                </button>
                <span class="filter-group__title">조회수 범위</span>
              </legend>

              <div id="viewCountFilterBody" class="filter-group__body" hidden>
                <div class="filter-group__row">
                  <label class="filter-group__label" for="minViewCountInput">최소</label>
                  <input id="minViewCountInput" class="filter-group__number" type="number" inputmode="numeric"
                    min="0" step="1" placeholder="예: 10000" disabled />
                </div>

                <div class="filter-group__row">
                  <label class="filter-group__label" for="maxViewCountInput">최대</label>
                  <input id="maxViewCountInput" class="filter-group__number" type="number" inputmode="numeric"
                    min="0" step="1" placeholder="예: 500000" disabled />
                </div>

                <p id="viewCountError" class="filter-group__error" hidden></p>
              </div>
            </fieldset>
          </div>

          <div class="actions">
            <button type="submit" id="loadVideoBtn" class="btn-primary">랜덤 영상 재생</button>
          </div>
        </form>


        <div class="divider" aria-hidden="true"></div>

        <div class="directPlay">
          <label>
            직접 링크 재생
            <div class="inputWrap">
              <input id="videoUrlInput" type="url" placeholder="https://youtu.be/..." />
              <button type="button" id="clearVideoUrlBtn" class="clearBtn" aria-label="영상 링크 지우기" hidden>×</button>
            </div>
          </label>
          <div class="actions">
            <button type="button" id="playUrlBtn" class="btn-primary">링크 영상 재생</button>
          </div>
        </div>
      </aside>
    </div>

    <section class="card gridCard" id="videoGridCard" hidden>
      <div id="channelBar" class="channelBar" hidden>
        <img id="channelThumb" class="channelBar__thumb" alt="" />
        <div class="channelBar__main">
          <div class="channelBar__titleRow">
            <span id="channelTitle" class="channelBar__title"></span>
            <span id="channelHandle" class="channelBar__handle"></span>
          </div>
          <div class="channelBar__stats">
            <span class="channelStat" id="channelStatSubs">구독자 —</span>
            <span class="channelStat" id="channelStatVideos">영상 —</span>
            <span class="channelStat" id="channelStatViews">조회수 —</span>
          </div>
        </div>
      </div>
      <div class="gridCard__head">
        <h2 class="gridCard__title">업로드 영상</h2>
        <span id="gridCount" class="gridCard__count"></span>
        <button type="button" id="loadMoreBtn" class="loadMoreBtn" hidden title="추가 영상 200개 불러오기">🔄</button>
      </div>
      <div id="videoGrid" class="videoGrid" role="list"></div>
      <div id="videoGridEmpty" class="videoGrid__empty" hidden>
        필터 조건에 맞는 영상이 없습니다.
      </div>
    </section>

    <!-- 쿠팡 파트너스 배너 -->
    <section class="ad-section" aria-label="쿠팡 파트너스 배너">
      <div class="ad-card">
        <div class="ad-card__head">
          <span class="ad-card__badge">AD</span>
          <span class="ad-card__title">쿠팡 파트너스</span>
        </div>
        <p class="ad-card__notice">아래 배너를 통해 쿠팡에서 구매하시면 저에게 소정의 수수료가 지급됩니다.</p>
        <div class="ad-card__banner">
          <script src="https://ads-partners.coupang.com/g.js"></script>
          <script>
            new PartnersCoupang.G({
              "id": 784952,
              "template": "carousel",
              "trackingCode": "AF1315244",
              "width": "100%",
              "height": "140",
              "tsource": ""
            });
          </script>
        </div>
      </div>
    </section>
  </main>

  <script src="config.js"></script>
  <script src="scripts.js"></script>
</body>

</html>
